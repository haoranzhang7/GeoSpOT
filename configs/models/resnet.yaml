
MODEL:
  name: "resnet50"
  architecture: "resnet"
  pretrained: true
  
TRAINING:
  learning_rate: 1e-3
  weight_decay: 1e-4
  momentum: 0.9
  max_grad_norm: 1.0
  
EMBEDDINGS:
  dimension: 2048  # ResNet50 feature dimension (before final FC layer)
  pooling: "avgpool"
  dropout: 0.0
  
OPTIMIZER:
  name: "sgd"
  momentum: 0.9
  nesterov: true
  
SCHEDULER:
  name: "step"
  step_size: 30
  gamma: 0.1

IMAGE_TRANSFORM:
  # ImageNet normalization (hardcoded in datasets)
  resize: 256
  crop_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

