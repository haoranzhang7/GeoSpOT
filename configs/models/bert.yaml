
MODEL:
  name: "bert_singlelabel"
  architecture: "transformer"
  pretrained: true
  
TRAINING:
  learning_rate: 2e-5
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  
EMBEDDINGS:
  dimension: 768
  pooling: "cls"
  dropout: 0.1
  
OPTIMIZER:
  name: "adamw"
  betas: [0.9, 0.999]
  eps: 1e-8
  
SCHEDULER:
  name: "linear"
  warmup_ratio: 0.1

TOKENIZER_TYPE: "bert-base-uncased"
