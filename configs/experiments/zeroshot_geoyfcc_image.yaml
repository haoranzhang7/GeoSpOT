PATHS:
  data_root: "./data"
  project_root: "."
  results_root: "./results"
  zeroshot_results_dir: ./results/zeroshot/geoyfcc_image

DATASET:
  gen_name: "geoyfcc_image"
  name: "geoyfcc_image"
  total_domains: 62  # All 62 countries
  source_domains: [57, 12, 34, 45, 23]  # Example source domains (adjust as needed)
  target_domains: [10, 20, 30, 40, 50]  # Example target domains (adjust as needed)

EXPERIMENT:
  name: "zeroshot_geoyfcc_image"
  type: "zeroshot_evaluation"

MODEL:
  name: "resnet50"
  checkpoint_dir: ./results/pretrain/geoyfcc_image/checkpoints
  # Use pretrained model from specific domains
  pretrain_domains: [57, 12, 34, 45, 23]

EVALUATION:
  batch_size: 256
  num_workers: 8
  splits: ["val", "test"]

COMPUTATION:
  device: "cuda"
  num_workers: 8
  pin_memory: true

MODEL_SEEDS: [48329, 17046, 62984, 31507, 90861]

